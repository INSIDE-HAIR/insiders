<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Video Conferencing APIs</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    .test-section {
      margin: 20px 0;
      padding: 15px;
      border: 1px solid #ccc;
    }

    .success {
      color: green;
    }

    .error {
      color: red;
    }

    pre {
      background: #f5f5f5;
      padding: 10px;
      overflow-x: auto;
    }
  </style>
</head>

<body>
  <h1>Test Video Conferencing APIs</h1>

  <div class="test-section">
    <h2>Integration Accounts</h2>
    <button onclick="testIntegrationAccounts()">Test Integration Accounts API</button>
    <div id="integration-result"></div>
  </div>

  <div class="test-section">
    <h2>Create Video Space</h2>
    <button onclick="testCreateVideoSpace()">Test Create Video Space API</button>
    <div id="create-result"></div>
  </div>

  <script>
    async function testIntegrationAccounts () {
      const resultDiv = document.getElementById( 'integration-result' );
      resultDiv.innerHTML = 'Testing...';

      try {
        const response = await fetch( '/api/video-conferencing/integration-accounts' );
        const data = await response.json();

        if ( response.ok ) {
          resultDiv.innerHTML = `
                        <div class="success">✅ Success!</div>
                        <pre>${ JSON.stringify( data, null, 2 ) }</pre>
                    `;
        } else {
          resultDiv.innerHTML = `
                        <div class="error">❌ Error: ${ response.status }</div>
                        <pre>${ JSON.stringify( data, null, 2 ) }</pre>
                    `;
        }
      } catch ( error ) {
        resultDiv.innerHTML = `
                    <div class="error">❌ Network Error: ${ error.message }</div>
                `;
      }
    }

    async function testCreateVideoSpace () {
      const resultDiv = document.getElementById( 'create-result' );
      resultDiv.innerHTML = 'Testing...';

      const testData = {
        title: "Test Meeting from HTML",
        description: "Testing the API from HTML page",
        provider: "MEET",
        maxParticipants: 25,
        requiresAuth: false,
        recordingEnabled: true,
        chatEnabled: true,
        screenShareEnabled: true,
        waitingRoomEnabled: false,
        integrationAccountId: "689c6896088fb8a02cbc1447",
        scheduledStartTime: "2025-08-14T15:00:00.000Z",
        scheduledEndTime: "2025-08-14T16:00:00.000Z"
      };

      try {
        const response = await fetch( '/api/video-conferencing/spaces', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify( testData )
        } );

        const data = await response.json();

        if ( response.ok ) {
          resultDiv.innerHTML = `
                        <div class="success">✅ Success! Video space created with ID: ${ data.id }</div>
                        <pre>${ JSON.stringify( data, null, 2 ) }</pre>
                    `;
        } else {
          resultDiv.innerHTML = `
                        <div class="error">❌ Error: ${ response.status }</div>
                        <pre>${ JSON.stringify( data, null, 2 ) }</pre>
                    `;
        }
      } catch ( error ) {
        resultDiv.innerHTML = `
                    <div class="error">❌ Network Error: ${ error.message }</div>
                `;
      }
    }
  </script>
</body>

</html>
